name: watchbell

services:
  watchbell:
    image: "${WATCHBELL_IMAGE:-ghcr.io/lesir831/watchbell:latest}"
    restart: unless-stopped
    ports:
      - "${WATCHBELL_BIND_IP:-0.0.0.0}:${WATCHBELL_PORT:-8080}:8080"
    environment:
      WATCHBELL_ADDR: ":8080"
      WATCHBELL_DB: "/data/watchbell.db"
      WATCHBELL_WEB_DIR: "/app/web/dist"
      WATCHBELL_WORKERS: "${WATCHBELL_WORKERS:-2}"
      WATCHBELL_SCHEDULER_TICK: "${WATCHBELL_SCHEDULER_TICK:-10s}"
      WATCHBELL_LOG_LEVEL: "${WATCHBELL_LOG_LEVEL:-info}"
      WATCHBELL_ADMIN_USERNAME: "${WATCHBELL_ADMIN_USERNAME:-admin}"
      WATCHBELL_ADMIN_PASSWORD: "${WATCHBELL_ADMIN_PASSWORD:?set WATCHBELL_ADMIN_PASSWORD}"
      WATCHBELL_SESSION_SECRET: "${WATCHBELL_SESSION_SECRET:?set WATCHBELL_SESSION_SECRET}"
      WATCHBELL_SESSION_TTL: "${WATCHBELL_SESSION_TTL:-168h}"
      WATCHBELL_COOKIE_SECURE: "${WATCHBELL_COOKIE_SECURE:-}"
      WATCHBELL_TRUST_PROXY_HEADERS: "${WATCHBELL_TRUST_PROXY_HEADERS:-false}"
      WATCHBELL_TRUSTED_PROXY_HOPS: "${WATCHBELL_TRUSTED_PROXY_HOPS:-1}"
      WATCHBELL_LOGIN_MAX_FAILURES: "${WATCHBELL_LOGIN_MAX_FAILURES:-5}"
      WATCHBELL_LOGIN_FAILURE_WINDOW: "${WATCHBELL_LOGIN_FAILURE_WINDOW:-15m}"
      WATCHBELL_HISTORY_RETENTION: "${WATCHBELL_HISTORY_RETENTION:-90d}"
      WATCHBELL_EVENT_RETENTION: "${WATCHBELL_EVENT_RETENTION:-}"
      WATCHBELL_CHECK_RUN_RETENTION: "${WATCHBELL_CHECK_RUN_RETENTION:-}"
      WATCHBELL_NOTIFICATION_ATTEMPT_RETENTION: "${WATCHBELL_NOTIFICATION_ATTEMPT_RETENTION:-}"
      WATCHBELL_AUDIT_LOG_RETENTION: "${WATCHBELL_AUDIT_LOG_RETENTION:-}"
      WATCHBELL_HISTORY_CLEANUP_INTERVAL: "${WATCHBELL_HISTORY_CLEANUP_INTERVAL:-6h}"
      WATCHBELL_HISTORY_CLEANUP_BATCH: "${WATCHBELL_HISTORY_CLEANUP_BATCH:-500}"
    volumes:
      - watchbell-data:/data
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  watchbell-data:
