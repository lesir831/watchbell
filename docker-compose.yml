services:
  watchbell:
    image: "${WATCHBELL_IMAGE:-watchbell:local}"
    build:
      context: .
      args:
        VERSION: "${WATCHBELL_VERSION:-dev}"
        VCS_REF: "${WATCHBELL_VCS_REF:-local}"
        BUILD_DATE: "${WATCHBELL_BUILD_DATE:-unknown}"
        SOURCE_URL: "${WATCHBELL_SOURCE_URL:-https://github.com/watchbell/watchbell}"
    ports:
      - "8080:8080"
    environment:
      WATCHBELL_ADDR: ":8080"
      WATCHBELL_DB: "/data/watchbell.db"
      WATCHBELL_WEB_DIR: "/app/web/dist"
      WATCHBELL_WORKERS: "4"
      WATCHBELL_SCHEDULER_TICK: "10s"
      WATCHBELL_ADMIN_USERNAME: "${WATCHBELL_ADMIN_USERNAME:-admin}"
      WATCHBELL_ADMIN_PASSWORD: "${WATCHBELL_ADMIN_PASSWORD:?set WATCHBELL_ADMIN_PASSWORD}"
      WATCHBELL_SESSION_SECRET: "${WATCHBELL_SESSION_SECRET:?set WATCHBELL_SESSION_SECRET}"
    volumes:
      - watchbell-data:/data
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  watchbell-data:
